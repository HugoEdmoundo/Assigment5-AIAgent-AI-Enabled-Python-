<!DOCTYPE html>
<html>
<head>
    <title>AI Agent Chat</title>
</head>
<body>
    <h1>AI Agent Chat (with Streaming)</h1>
    <p>Session ID: <span id="sessionId">Creating...</span></p>
    
    <div id="chatMessages" style="border: 1px solid #ccc; padding: 10px; height: 400px; overflow-y: auto; margin-bottom: 10px;">
        <div><strong>System:</strong> Hi! I'm your AI assistant with streaming support!</div>
    </div>
    
    <input type="text" id="chatInput" placeholder="Type your message..." style="width: 70%;">
    <button id="sendButton" onclick="sendMessage()">Send</button>
    <button onclick="sendStreamMessage()">Send (Stream)</button>

    <script>
        const API_URL = 'http://localhost:8000';
        const chatMessages = document.getElementById('chatMessages');
        const chatInput = document.getElementById('chatInput');
        const sendButton = document.getElementById('sendButton');
        let sessionId = null;

        // Create session on load
        async function createSession() {
            try {
                const response = await fetch(`${API_URL}/api/agent/session/create`, {
                    method: 'POST'
                });
                const data = await response.json();
                sessionId = data.session_id;
                document.getElementById('sessionId').textContent = sessionId;
            } catch (error) {
                console.error('Error creating session:', error);
            }
        }

        createSession();

        chatInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        function addMessage(content, type) {
            const messageDiv = document.createElement('div');
            messageDiv.style.marginBottom = '10px';
            
            if (type === 'user') {
                messageDiv.innerHTML = '<strong>You:</strong> ' + content;
            } else if (type === 'assistant') {
                messageDiv.innerHTML = '<strong>Agent:</strong> ' + content;
                messageDiv.id = 'lastAssistant';
            } else {
                messageDiv.innerHTML = '<strong>System:</strong> ' + content;
            }
            
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            return messageDiv;
        }

        function updateLastMessage(content) {
            const lastMsg = document.getElementById('lastAssistant');
            if (lastMsg) {
                lastMsg.innerHTML = '<strong>Agent:</strong> ' + content;
            }
        }

        async function sendMessage() {
            const message = chatInput.value.trim();
            if (!message) return;

            addMessage(message, 'user');
            chatInput.value = '';
            
            sendButton.disabled = true;
            chatInput.disabled = true;
            
            addMessage('Thinking...', 'system');

            try {
                const response = await fetch(`${API_URL}/api/agent/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        message,
                        session_id: sessionId
                    })
                });

                chatMessages.removeChild(chatMessages.lastChild);

                if (!response.ok) {
                    throw new Error('HTTP error! status: ' + response.status);
                }

                const data = await response.json();
                sessionId = data.session_id;
                
                let responseText = data.response;
                if (data.tools_used && data.tools_used.length > 0) {
                    responseText += ' [Tools: ' + data.tools_used.join(', ') + ']';
                }
                
                addMessage(responseText, 'assistant');
            } catch (error) {
                chatMessages.removeChild(chatMessages.lastChild);
                addMessage('Error: ' + error.message, 'system');
                console.error('Error:', error);
            } finally {
                sendButton.disabled = false;
                chatInput.disabled = false;
                chatInput.focus();
            }
        }

        async function sendStreamMessage() {
            const message = chatInput.value.trim();
            if (!message) return;

            addMessage(message, 'user');
            chatInput.value = '';
            
            sendButton.disabled = true;
            chatInput.disabled = true;
            
            const assistantMsg = addMessage('', 'assistant');
            let fullResponse = '';

            try {
                const response = await fetch(`${API_URL}/api/agent/chat/stream`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        message,
                        session_id: sessionId
                    })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const data = JSON.parse(line.slice(6));
                            if (data.chunk) {
                                fullResponse += data.chunk;
                                assistantMsg.innerHTML = '<strong>Agent:</strong> ' + fullResponse;
                                chatMessages.scrollTop = chatMessages.scrollHeight;
                            }
                            if (data.done) {
                                sessionId = data.session_id;
                            }
                        }
                    }
                }
            } catch (error) {
                addMessage('Error: ' + error.message, 'system');
                console.error('Error:', error);
            } finally {
                sendButton.disabled = false;
                chatInput.disabled = false;
                chatInput.focus();
            }
        }

        chatInput.focus();
    </script>
</body>
</html>
